<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vsiljivec - Party Igra</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animation-fade-in { animation: fadeIn 0.4s ease-out; }
        .animation-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .animation-scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const WORD_PAIRS = [
            { main: "Jabolko", similar: "Hruška" }, { main: "Kava", similar: "Čaj" },
            { main: "Pivo", similar: "Vino" }, { main: "Palačinke", similar: "Vaflji" },
            { main: "Mleko", similar: "Voda" }, { main: "Pica", similar: "Hamburger" },
            { main: "Kruh", similar: "Žemlja" }, { main: "Torta", similar: "Pita" },
            { main: "Telefon", similar: "Tablica" }, { main: "Knjiga", similar: "Revija" },
            { main: "Morje", similar: "Jezero" }, { main: "Sonce", similar: "Luna" },
            { main: "Avto", similar: "Kolo" }, { main: "Avtobus", similar: "Vlak" },
            { main: "Letalo", similar: "Helikopter" }, { main: "Slovenija", similar: "Hrvaška" },
            { main: "Mačka", similar: "Pes" }, { main: "Gozd", similar: "Džungla" }
        ];

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const UsersIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const SmartphoneIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>;

        function App() {
            const [phase, setPhase] = useState('SETUP');
            const [players, setPlayers] = useState(['Ana', 'Bojan', 'Cene', 'Darja']);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [impostorCount, setImpostorCount] = useState(1);
            const [confusedCount, setConfusedCount] = useState(1);
            const [gameData, setGameData] = useState([]);
            const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);

            const totalSpecialRoles = impostorCount + confusedCount;
            const isSetupValid = players.length >= 3 && totalSpecialRoles < players.length;

            const startGame = () => {
                if (!isSetupValid) return;
                const pair = WORD_PAIRS[Math.floor(Math.random() * WORD_PAIRS.length)];
                const swap = Math.random() > 0.5;
                const mainWord = swap ? pair.similar : pair.main;
                const similarWord = swap ? pair.main : pair.similar;
                
                let roles = [];
                for (let i = 0; i < impostorCount; i++) roles.push({ type: 'IMPOSTOR', word: null });
                for (let i = 0; i < confusedCount; i++) roles.push({ type: 'CONFUSED', word: similarWord });
                for (let i = 0; i < (players.length - totalSpecialRoles); i++) roles.push({ type: 'MAJORITY', word: mainWord });

                const shuffledRoles = shuffleArray(roles);
                const assigned = players.map((name, i) => ({ name, role: shuffledRoles[i].type, word: shuffledRoles[i].word }));

                setGameData(assigned);
                setCurrentPlayerIndex(0);
                setPhase('PASS');
            };

            return (
                <div className="min-h-screen text-slate-100 flex flex-col items-center p-4">
                    <header className="pt-8 pb-4 text-center">
                        <h1 className="text-4xl font-black bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent uppercase tracking-tighter">Vsiljivec</h1>
                        <p className="text-slate-500 text-sm">GitHub Pages Edition</p>
                    </header>

                    <main className="flex-1 max-w-md w-full flex flex-col justify-center">
                        {phase === 'SETUP' && (
                            <div className="space-y-6 animation-fade-in">
                                <div className="bg-slate-800/50 border border-slate-700 rounded-3xl p-6 shadow-xl">
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><UsersIcon/> Igralci</h2>
                                    <div className="flex gap-2 mb-4">
                                        <input type="text" value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} className="flex-1 bg-slate-900 border border-slate-600 rounded-xl px-4 py-2" placeholder="Ime..." />
                                        <button onClick={() => { if(newPlayerName.trim()) { setPlayers([...players, newPlayerName.trim()]); setNewPlayerName(''); } }} className="bg-indigo-600 px-4 rounded-xl font-bold">Dodaj</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2 max-h-40 overflow-y-auto custom-scrollbar">
                                        {players.map(p => (
                                            <span key={p} className="bg-slate-700 px-3 py-1 rounded-full flex items-center gap-2 text-sm border border-slate-600">
                                                {p} <button onClick={() => setPlayers(players.filter(x => x !== p))} className="text-red-400 font-bold">×</button>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <button onClick={startGame} disabled={!isSetupValid} className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 py-4 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95 uppercase">Začni Igro</button>
                            </div>
                        )}

                        {phase === 'PASS' && (
                            <div className="text-center space-y-8 animation-slide-up bg-slate-800/60 p-10 rounded-3xl border border-slate-700">
                                <SmartphoneIcon className="mx-auto text-indigo-400 animate-pulse" />
                                <div>
                                    <p className="text-slate-400 uppercase text-xs tracking-widest mb-2">Podaj telefon:</p>
                                    <h2 className="text-5xl font-black">{gameData[currentPlayerIndex].name}</h2>
                                </div>
                                <button onClick={() => setPhase('REVEAL')} className="w-full bg-indigo-600 py-5 rounded-2xl font-bold text-xl shadow-xl">Sem {gameData[currentPlayerIndex].name}</button>
                            </div>
                        )}

                        {phase === 'REVEAL' && (
                            <div className="text-center space-y-6 animation-scale-in">
                                <div className="bg-slate-800 p-10 rounded-3xl border-2 border-indigo-500 shadow-2xl">
                                    <p className="text-slate-400 mb-4">Tvoja beseda je:</p>
                                    <h2 className="text-4xl font-black uppercase tracking-wider">
                                        {gameData[currentPlayerIndex].role === 'IMPOSTOR' ? <span className="text-red-500">VSILJIVEC</span> : gameData[currentPlayerIndex].word}
                                    </h2>
                                </div>
                                <button onClick={() => {
                                    if (currentPlayerIndex + 1 < gameData.length) {
                                        setCurrentPlayerIndex(currentPlayerIndex + 1);
                                        setPhase('PASS');
                                    } else {
                                        setPhase('END');
                                    }
                                }} className="w-full bg-slate-700 py-5 rounded-2xl font-bold text-xl">Skrij in nadaljuj</button>
                            </div>
                        )}

                        {phase === 'END' && (
                            <div className="text-center space-y-6 animation-fade-in">
                                <div className="bg-emerald-900/20 border border-emerald-500/30 p-8 rounded-3xl">
                                    <h2 className="text-3xl font-bold text-emerald-400 mb-2">Pripravljeni!</h2>
                                    <p className="text-slate-300">Vsak naj pove eno asociacijo, nato glasujte o vsiljivcu.</p>
                                </div>
                                <button onClick={() => setPhase('SETUP')} className="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-xl">Nova Igra</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
