<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vsiljivec - Party Igra</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animation-fade-in { animation: fadeIn 0.4s ease-out; }
        .animation-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .animation-scale-in { animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        const WORD_PAIRS = [
            { main: "Jabolko", similar: "Hruška" }, { main: "Kava", similar: "Čaj" },
            { main: "Pivo", similar: "Vino" }, { main: "Palačinke", similar: "Vaflji" },
            { main: "Mleko", similar: "Voda" }, { main: "Pica", similar: "Hamburger" },
            { main: "Kruh", similar: "Žemlja" }, { main: "Torta", similar: "Pita" },
            { main: "Telefon", similar: "Tablica" }, { main: "Knjiga", similar: "Revija" },
            { main: "Morje", similar: "Jezero" }, { main: "Sonce", similar: "Luna" },
            { main: "Avto", similar: "Kolo" }, { main: "Avtobus", similar: "Vlak" },
            { main: "Letalo", similar: "Helikopter" }, { main: "Slovenija", similar: "Hrvaška" },
            { main: "Mačka", similar: "Pes" }, { main: "Gozd", similar: "Džungla" }
        ];
        const FOCUSABLE_SELECTOR = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };
        const clampCount = (value, min, max) => Math.min(Math.max(value, min), max);
        const parseCountInput = (value) => {
            if (!/^\d+$/.test(value)) return null;
            return Number.parseInt(value, 10);
        };
        const preventInvalidNumberInput = (event) => {
            if (['e', 'E', '+', '-', '.', ','].includes(event.key)) {
                event.preventDefault();
            }
        };
        const calculateMaxImpostorCount = (playerCount, currentConfusedCount) => Math.max(0, playerCount - currentConfusedCount - 1);
        const calculateMaxConfusedCount = (playerCount, currentImpostorCount) => Math.max(0, playerCount - currentImpostorCount - 1);

        const UsersIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline"><circle cx="12" cy="12" r="3"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const ChevronDownIcon = ({ isOpen }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`transition-transform ${isOpen ? 'rotate-180' : ''}`}>
                <path d="m6 9 6 6 6-6"/>
            </svg>
        );
        const SmartphoneIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>;
        const HelpCircleIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="inline"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.82 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;

        function App() {
            const [phase, setPhase] = useState('SETUP');
            const [players, setPlayers] = useState(['Ana', 'Bojan', 'Cene', 'Darja']);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [impostorCount, setImpostorCount] = useState(1);
            const [confusedCount, setConfusedCount] = useState(1);
            const [gameData, setGameData] = useState([]);
            const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);
            const [isHelpOpen, setIsHelpOpen] = useState(false);
            const [isConfigOpen, setIsConfigOpen] = useState(false);
            const helpDialogRef = useRef(null);
            const previousFocusRef = useRef(null);
            const getHelpDialogFocusableElements = () => helpDialogRef.current?.querySelectorAll(FOCUSABLE_SELECTOR) || [];

            useEffect(() => {
                if (!isHelpOpen) return;

                const handleKeyDown = (event) => {
                    if (event.key === 'Escape') {
                        event.preventDefault();
                        event.stopPropagation();
                        setIsHelpOpen(false);
                        return;
                    }

                    if (event.key !== 'Tab' || !helpDialogRef.current) return;

                    const focusableElements = getHelpDialogFocusableElements();
                    const firstFocusable = focusableElements[0];
                    const lastFocusable = focusableElements[focusableElements.length - 1];

                    if (!firstFocusable || !lastFocusable) return;

                    if (event.shiftKey && document.activeElement === firstFocusable) {
                        event.preventDefault();
                        lastFocusable.focus();
                    } else if (!event.shiftKey && document.activeElement === lastFocusable) {
                        event.preventDefault();
                        firstFocusable.focus();
                    }
                };

                const focusableElements = getHelpDialogFocusableElements();
                focusableElements?.[0]?.focus();

                window.addEventListener('keydown', handleKeyDown);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    previousFocusRef.current?.focus?.();
                };
            }, [isHelpOpen]);

            useEffect(() => {
                const nextConfusedCount = Math.min(confusedCount, calculateMaxConfusedCount(players.length, impostorCount));
                const nextImpostorCount = Math.min(impostorCount, calculateMaxImpostorCount(players.length, nextConfusedCount));

                if (confusedCount > nextConfusedCount) {
                    setConfusedCount(nextConfusedCount);
                }

                if (impostorCount > nextImpostorCount) {
                    setImpostorCount(nextImpostorCount);
                }
            }, [players.length]);

            const totalSpecialRoles = impostorCount + confusedCount;
            const isSetupValid = players.length >= 3 && totalSpecialRoles < players.length;
            const maxImpostorOptions = calculateMaxImpostorCount(players.length, confusedCount);
            const maxConfusedOptions = calculateMaxConfusedCount(players.length, impostorCount);
            const handleImpostorCountChange = (nextImpostorCount) => {
                const safeImpostorCount = clampCount(nextImpostorCount, 0, maxImpostorOptions);
                setImpostorCount(safeImpostorCount);
                const nextMaxConfusedCount = calculateMaxConfusedCount(players.length, safeImpostorCount);
                setConfusedCount(currentConfusedCount => Math.min(currentConfusedCount, nextMaxConfusedCount));
            };
            const handleConfusedCountChange = (nextConfusedCount) => {
                const safeConfusedCount = clampCount(nextConfusedCount, 0, maxConfusedOptions);
                setConfusedCount(safeConfusedCount);
                const nextMaxImpostorCount = calculateMaxImpostorCount(players.length, safeConfusedCount);
                setImpostorCount(currentImpostorCount => Math.min(currentImpostorCount, nextMaxImpostorCount));
            };
            const handleImpostorInputChange = (value) => {
                const parsedValue = parseCountInput(value);
                if (parsedValue === null) return;
                handleImpostorCountChange(parsedValue);
            };
            const handleConfusedInputChange = (value) => {
                const parsedValue = parseCountInput(value);
                if (parsedValue === null) return;
                handleConfusedCountChange(parsedValue);
            };

            const startGame = () => {
                if (!isSetupValid) return;
                const pair = WORD_PAIRS[Math.floor(Math.random() * WORD_PAIRS.length)];
                const swap = Math.random() > 0.5;
                const mainWord = swap ? pair.similar : pair.main;
                const similarWord = swap ? pair.main : pair.similar;
                
                let roles = [];
                for (let i = 0; i < impostorCount; i++) roles.push({ type: 'IMPOSTOR', word: null });
                for (let i = 0; i < confusedCount; i++) roles.push({ type: 'CONFUSED', word: similarWord });
                for (let i = 0; i < (players.length - totalSpecialRoles); i++) roles.push({ type: 'MAJORITY', word: mainWord });

                const shuffledRoles = shuffleArray(roles);
                const assigned = players.map((name, i) => ({ name, role: shuffledRoles[i].type, word: shuffledRoles[i].word }));

                setGameData(assigned);
                setCurrentPlayerIndex(0);
                setPhase('PASS');
            };

            return (
                <div className="min-h-screen text-slate-900 flex flex-col items-center p-4">
                    <header className="pt-8 pb-4 text-center">
                        <h1 className="text-4xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent uppercase tracking-tighter">Vsiljivec</h1>
                    </header>

                    <main className="flex-1 max-w-md w-full flex flex-col justify-center">
                        {phase === 'SETUP' && (
                            <div className="space-y-6 animation-fade-in">
                                <button aria-label="Odpri pomoč in pravila igre" onClick={() => { previousFocusRef.current = document.activeElement; setIsHelpOpen(true); }} className="w-full bg-white hover:bg-slate-50 border border-slate-200 py-3 rounded-2xl font-semibold text-slate-700 shadow-sm transition-colors flex items-center justify-center gap-2">
                                    <HelpCircleIcon />
                                    Kako se igra?
                                </button>
                                <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-xl">
                                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><UsersIcon/> Igralci</h2>
                                    <div className="flex gap-2 mb-4">
                                        <input type="text" value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} className="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-4 py-2" placeholder="Ime..." aria-label="Ime igralca" />
                                        <button onClick={() => { if(newPlayerName.trim()) { setPlayers([...players, newPlayerName.trim()]); setNewPlayerName(''); } }} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 rounded-xl font-bold shadow-md transition-all active:scale-95">Dodaj</button>
                                    </div>
                                    <div className="flex flex-wrap gap-2 max-h-40 overflow-y-auto custom-scrollbar">
                                        {players.map(p => (
                                            <span key={p} className="bg-slate-100 px-3 py-1 rounded-full flex items-center gap-2 text-sm border border-slate-300">
                                                {p} <button onClick={() => setPlayers(players.filter(x => x !== p))} className="text-red-600 hover:text-red-700 focus-visible:text-red-700 font-bold">×</button>
                                            </span>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-xl">
                                    <button
                                        type="button"
                                        onClick={() => setIsConfigOpen(!isConfigOpen)}
                                        aria-expanded={isConfigOpen}
                                        aria-controls="game-configuration-panel"
                                        className="w-full flex items-center justify-between gap-4 text-left"
                                    >
                                        <div>
                                            <h2 className="text-xl font-bold flex items-center gap-2"><SettingsIcon /> Konfiguracija igre</h2>
                                            <p className="text-sm text-slate-500 mt-1">Vsiljivci: {impostorCount} • Zmedeni: {confusedCount}</p>
                                        </div>
                                        <span className="text-slate-500">
                                            <ChevronDownIcon isOpen={isConfigOpen} />
                                        </span>
                                    </button>

                                    {isConfigOpen && (
                                        <div id="game-configuration-panel" className="mt-5 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <label className="block">
                                                <span className="text-sm font-semibold text-slate-700">Število vsiljivcev</span>
                                                <div className="mt-2 flex items-center gap-2">
                                                    <button
                                                        type="button"
                                                        onClick={() => handleImpostorCountChange(impostorCount - 1)}
                                                        disabled={impostorCount <= 0}
                                                        className="h-12 w-12 rounded-xl border border-slate-300 bg-white text-xl font-bold text-slate-700 shadow-sm transition-colors hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                                                        aria-label="Zmanjšaj število vsiljivcev"
                                                    >
                                                        −
                                                    </button>
                                                    <input
                                                        type="number"
                                                        inputMode="numeric"
                                                        min="0"
                                                        step="1"
                                                        max={maxImpostorOptions}
                                                        value={impostorCount}
                                                        onChange={(event) => handleImpostorInputChange(event.target.value)}
                                                        onKeyDown={preventInvalidNumberInput}
                                                        className="h-12 w-full rounded-xl border border-slate-300 bg-slate-50 px-4 text-center text-lg font-semibold"
                                                        aria-label="Število vsiljivcev"
                                                    />
                                                    <button
                                                        type="button"
                                                        onClick={() => handleImpostorCountChange(impostorCount + 1)}
                                                        disabled={impostorCount >= maxImpostorOptions}
                                                        className="h-12 w-12 rounded-xl border border-slate-300 bg-white text-xl font-bold text-slate-700 shadow-sm transition-colors hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                                                        aria-label="Povečaj število vsiljivcev"
                                                    >
                                                        +
                                                    </button>
                                                </div>
                                            </label>

                                            <label className="block">
                                                <span className="text-sm font-semibold text-slate-700">Število zmedenih</span>
                                                <div className="mt-2 flex items-center gap-2">
                                                    <button
                                                        type="button"
                                                        onClick={() => handleConfusedCountChange(confusedCount - 1)}
                                                        disabled={confusedCount <= 0}
                                                        className="h-12 w-12 rounded-xl border border-slate-300 bg-white text-xl font-bold text-slate-700 shadow-sm transition-colors hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                                                        aria-label="Zmanjšaj število zmedenih"
                                                    >
                                                        −
                                                    </button>
                                                    <input
                                                        type="number"
                                                        inputMode="numeric"
                                                        min="0"
                                                        step="1"
                                                        max={maxConfusedOptions}
                                                        value={confusedCount}
                                                        onChange={(event) => handleConfusedInputChange(event.target.value)}
                                                        onKeyDown={preventInvalidNumberInput}
                                                        className="h-12 w-full rounded-xl border border-slate-300 bg-slate-50 px-4 text-center text-lg font-semibold"
                                                        aria-label="Število zmedenih"
                                                    />
                                                    <button
                                                        type="button"
                                                        onClick={() => handleConfusedCountChange(confusedCount + 1)}
                                                        disabled={confusedCount >= maxConfusedOptions}
                                                        className="h-12 w-12 rounded-xl border border-slate-300 bg-white text-xl font-bold text-slate-700 shadow-sm transition-colors hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                                                        aria-label="Povečaj število zmedenih"
                                                    >
                                                        +
                                                    </button>
                                                </div>
                                            </label>

                                            <p className="sm:col-span-2 text-sm text-slate-500 leading-6">
                                                Nastavitve se samodejno prilagodijo številu igralcev, da v igri vedno ostane vsaj en običajen igralec.
                                            </p>
                                        </div>
                                    )}
                                </div>
                                <button onClick={startGame} disabled={!isSetupValid} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white disabled:opacity-50 py-4 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95 uppercase">Začni Igro</button>
                            </div>
                        )}

                        {phase === 'PASS' && (
                            <div className="text-center space-y-8 animation-slide-up bg-white p-10 rounded-3xl border border-slate-200 shadow-lg">
                                <SmartphoneIcon className="mx-auto text-indigo-400 animate-pulse" />
                                <div>
                                    <p className="text-slate-500 uppercase text-xs tracking-widest mb-2">Podaj telefon:</p>
                                    <h2 className="text-5xl font-black">{gameData[currentPlayerIndex].name}</h2>
                                </div>
                                <button onClick={() => setPhase('REVEAL')} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-bold text-xl shadow-xl transition-all active:scale-95">Sem {gameData[currentPlayerIndex].name}</button>
                            </div>
                        )}

                        {phase === 'REVEAL' && (
                            <div className="text-center space-y-6 animation-scale-in">
                                <div className="bg-white p-10 rounded-3xl border-2 border-indigo-500 shadow-2xl">
                                    <p className="text-slate-500 mb-4">Tvoja beseda je:</p>
                                    <h2 className="text-4xl font-black uppercase tracking-wider">
                                        {gameData[currentPlayerIndex].role === 'IMPOSTOR' ? <span className="text-red-500">VSILJIVEC</span> : gameData[currentPlayerIndex].word}
                                    </h2>
                                </div>
                                <button onClick={() => {
                                    if (currentPlayerIndex + 1 < gameData.length) {
                                        setCurrentPlayerIndex(currentPlayerIndex + 1);
                                        setPhase('PASS');
                                    } else {
                                        setPhase('END');
                                    }
                                }} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-bold text-xl shadow-lg transition-all active:scale-95">Skrij in nadaljuj</button>
                            </div>
                        )}

                        {phase === 'END' && (
                            <div className="text-center space-y-6 animation-fade-in">
                                <div className="bg-emerald-50 border border-emerald-300 p-8 rounded-3xl">
                                    <h2 className="text-3xl font-bold text-emerald-600 mb-2">Pripravljeni!</h2>
                                    <p className="text-slate-600">Vsak naj pove eno asociacijo, nato glasujte o vsiljivcu.</p>
                                </div>
                                <button onClick={() => setPhase('SETUP')} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-bold text-xl shadow-lg transition-all active:scale-95">Nova Igra</button>
                            </div>
                        )}
                    </main>

                    {isHelpOpen && (
                        <div onClick={() => setIsHelpOpen(false)} className="fixed inset-0 z-10 bg-slate-900/30 backdrop-blur-sm p-4 flex items-center justify-center">
                            <div ref={helpDialogRef} onClick={(event) => event.stopPropagation()} role="dialog" aria-modal="true" aria-labelledby="help-dialog-title" aria-describedby="help-dialog-description" className="w-full max-w-md bg-white border border-slate-200 rounded-3xl shadow-2xl p-6 space-y-5 animation-scale-in">
                                <div className="flex items-start justify-between gap-4">
                                    <div>
                                        <h2 id="help-dialog-title" className="text-2xl font-black text-slate-900">Kako igrati</h2>
                                        <p id="help-dialog-description" className="text-slate-500 text-sm mt-1">Hitra družabna igra socialne dedukcije.</p>
                                    </div>
                                    <button onClick={() => setIsHelpOpen(false)} className="text-slate-400 hover:text-slate-700 text-2xl leading-none" aria-label="Zapri pomoč">
                                        <span aria-hidden="true">×</span>
                                    </button>
                                </div>

                                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 space-y-2">
                                    <h3 className="font-bold text-indigo-600">Kaj je Vsiljivec?</h3>
                                    <p className="text-slate-600 text-sm leading-6">
                                        Večina igralcev dobi isto skrivno besedo, nekateri pa dobijo podobno besedo ali pa nobene.
                                        Cilj skupine je odkriti vsiljivca, cilj vsiljivca pa je, da ostane neodkrit.
                                    </p>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="font-bold text-indigo-600">Vloge</h3>
                                    <ul className="space-y-2 text-sm text-slate-600">
                                        <li><span className="font-semibold text-slate-900">Večina:</span> prejme glavno besedo.</li>
                                        <li><span className="font-semibold text-slate-900">Zmeden:</span> prejme podobno, a drugačno besedo.</li>
                                        <li><span className="font-semibold text-slate-900">Vsiljivec:</span> ne prejme nobene besede in mora improvizirati.</li>
                                    </ul>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="font-bold text-indigo-600">Pravila</h3>
                                    <ol className="space-y-2 text-sm text-slate-600 list-decimal list-inside">
                                        <li>Dodajte vse igralce in začnite igro.</li>
                                        <li>Vsak igralec po vrsti vzame telefon, razkrije svojo besedo in ga poda naprej.</li>
                                        <li>Ko vsi vidijo svojo vlogo, vsak pove eno asociacijo na svojo besedo.</li>
                                        <li>Skupaj glasujte, kdo je po vašem mnenju vsiljivec.</li>
                                        <li>Po glasovanju začnite novo rundo.</li>
                                    </ol>
                                </div>

                                <button onClick={() => setIsHelpOpen(false)} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-2xl font-bold transition-colors shadow-lg">
                                    Zapri pomoč
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
